<!-- Stats -->
<app-stat-card title="Total" [value]="totalInspections"></app-stat-card>

<app-stat-card 
  title="Conforming" 
  [value]="conforming" 
  color="green">
</app-stat-card>

<app-stat-card 
  title="Defective" 
  [value]="defective" 
  color="red">
</app-stat-card>

<app-stat-card 
  title="Defect Rate" 
  [value]="defectRate" 
  type="circle">
</app-stat-card>

<!-- Inspection list -->
<app-inspection-list [inspections]="inspections.slice(0,5)">
</app-inspection-list>
