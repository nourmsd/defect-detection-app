<div class="dashboard-wrapper">
  <mat-toolbar color="primary" class="glass-toolbar">
    <span>Inspection History</span>
    <span class="spacer"></span>
    <nav class="admin-nav">
      <a mat-button routerLink="/admin-dashboard">Overview</a>
      <a mat-button routerLink="/admin/history" routerLinkActive="active">History</a>
      <a mat-button routerLink="/admin/analytics">Analytics</a>
    </nav>
    <button mat-icon-button (click)="logout()">
      <mat-icon>logout</mat-icon>
    </button>
  </mat-toolbar>

  <div class="content-container">
    <div class="glass-panel full-width">
      <h3>Detailed Inspection Logs</h3>
      <table mat-table [dataSource]="history" class="full-width-table glass-table">
        <ng-container matColumnDef="id">
          <th mat-header-cell *matHeaderCellDef>Product ID</th>
          <td mat-cell *matCellDef="let element">{{ element.id }}</td>
        </ng-container>

        <ng-container matColumnDef="result">
          <th mat-header-cell *matHeaderCellDef>Result</th>
          <td mat-cell *matCellDef="let element">
            <span class="result-badge" [ngClass]="element.result.toLowerCase()">
              {{ element.result }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="timestamp">
          <th mat-header-cell *matHeaderCellDef>Timestamp</th>
          <td mat-cell *matCellDef="let element">{{ element.timestamp | date:'medium' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>
    </div>
  </div>
</div>
